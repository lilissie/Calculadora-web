    <h1 id="title">Integración Numérica</h1>
    <div id="main-container">
        
        <form method="post">

            <label>Escriba su función:</label>
            <math-field style="width: 30em;" id="formula" virtual-keyboard-mode="manual">f(x)=</math-field>
            <div id="keyboard-container"></div>

            <div class="limites-container">
                <div>
                    <label for="a">Límite inferior (a):</label>
                    <input type="number" step="any" name="a" required>
                </div>
                <div>
                    <label for="b">Límite superior (b):</label>
                    <input type="number" step="any" name="b" required>
                </div>
                <div>
                    <label for="n">Subintervalos (n):</label>
                    <input type="number" name="n" required>
                </div>
            </div>

            <label for="metodo">Método:</label>
            <select name="metodo" required>
                <option value="trapecio">Trapecio</option>
                <option value="simpson13">Simpson 1/3</option>
                <option value="simpson38">Simpson 3/8</option>
            </select><br><br>

            <button type="submit">Calcular</button>
        </form>
    
        <div id="resultado"><h3>Resultado:</h3></div>
    </div>

<script>
    
// Traduce LaTeX a notación de backend (sin espacios, con cos(...), etc.)
function traducirLatex(latex) {
    let s = latex
    .trim()
    .replace(/^f\(x\)\s*=\s*/, "")

    .replace(/\\frac\{([^}]+)\}\{([^}]+)\}/g, "($1)/($2)") //division
    .replace(/e\^\{([^}]+)\}/g, "np.e**($1)")
    .replace(/\\pi/g, "pi")

    // Funciones trigonométricas
    .replace(/\\sin\s*\(?/g, "sin(")
    .replace(/\\cos\s*\(?/g, "cos(")
    .replace(/\\tan\s*\(?/g, "tan(")
    .replace(/\\sec\s*\(?/g, "sec(")
    .replace(/\\csc\s*\(?/g, "csc(")
    .replace(/\\cot\s*\(?/g, "cot(")

    // Logaritmos, exponenciales, raíces
    .replace(/\\ln\s*\(?/g, "ln(")
    .replace(/\\log\s*\(?/g, "log(")
    .replace(/\\exp\s*\(?/g, "exp(")
    .replace(/\\sqrt\s*\{([^}]+)\}/g, "sqrt($1)")
    .replace(/\\left\|([^|]+)\\right\|/g, "abs($1)")

    // Fracciones y paréntesis
    .replace(/\\frac\{([^}]+)\}\{([^}]+)\}/g, "($1)/($2)")
    .replace(/e\^\{([^}]+)\}/g, "e**($1)")
    .replace(/\\left\(/g, "(")
    .replace(/\\right\)/g, ")")

    // Operadores
    .replace(/\\cdot|\\times/g, "*")
    .replace(/\\div/g, "/")
    .replace(/\\pm/g, "±")
    .replace(/\\mp/g, "∓")
    .replace(/\^/g, "**")

    // Multiplicación implícita
    .replace(/(\d)([a-zA-Z])/g, "$1*$2")
    .replace(/([a-zA-Z])(\d)/g, "$1*$2")

    // Cierre de paréntesis de funciones
    .replace(/(sin|cos|tan|sec|csc|cot|ln|log|exp)\(([^\)]+)/g, "$1($2)")

    // Quitar espacios
    .replace(/\s+/g, "");

    return s;
}

async function calcularIntegracion() {
  // Obtener valores de inputs
    const rawLatex = document.getElementById('formula').getValue();
    const funcion = traducirLatex(rawLatex);
    const a = parseFloat(document.querySelector('input[name="a"]').value);
    const b = parseFloat(document.querySelector('input[name="b"]').value);
    const n = parseInt(document.querySelector('input[name="n"]').value);
    const metodo = document.querySelector('select[name="metodo"]').value;
    const caja1= document.getElementById("resultado")
    caja1.innerHTML=""

    // Mostrar por consola lo ingresado
    console.log('Valores ingresados:');
    console.log({ rawLatex, funcion, a, b, n, metodo });

    try {
    const resp = await fetch('/integracion', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ funcion, a, b, n, metodo }),
    });

    const data = await resp.json();

    if (data.error) {
        console.error(`Error desde backend: ${data.error}`);
        alert(`Error: ${data.error}`);
        return;
    }

    // Mostrar por consola el resultado recibido
    const puntosTexto = data.puntos.map(p => `x: ${p.x.toFixed(4)}, f(x): ${p.fx.toFixed(6)}`).join('<br>');

    const item= document.createElement("div")
    item.innerHTML=
    `
    <h3>Resultado: ${data.resultado}</h3>
    <p>${puntosTexto}</p>
    `
    caja1.append(item)

    } catch (err) {
        alert('Error al calcular la integración.');
        console.error(err);
    }
}

document.addEventListener('DOMContentLoaded', () => {
    document.querySelector('form').addEventListener('submit', e => {
        e.preventDefault();
        calcularIntegracion();
    });
});

</script>
